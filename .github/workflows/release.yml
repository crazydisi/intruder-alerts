name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build -Pmod_version=${{ steps.version.outputs.version }} --no-daemon

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ github.ref_name }}
          github-files: build/libs/intruderalerts-*.jar
          github-generate-changelog: true

          # Modrinth: set the MODRINTH_PROJECT_ID repo variable and MODRINTH_TOKEN repo secret to enable.
          # mc-publish skips Modrinth automatically when either is missing.
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false

          files: build/libs/intruderalerts-*.jar
          name: IntruderAlerts ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release

          loaders: fabric
          game-versions: '26.1.2'
          java: '25'

          dependencies: |
            fabric-api(required)
