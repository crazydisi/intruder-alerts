name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Force any action that still declares Node.js 20 (e.g. Kir-Antipov/mc-publish@v3.3)
# to run on Node.js 24. GitHub Actions makes this the default on 2026-06-16 and
# removes the Node 20 runtime on 2026-09-16, so we opt in early to surface any
# incompatibility now instead of at release time.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build -Pmod_version=${{ steps.version.outputs.version }} --no-daemon

      - name: Publish GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ github.ref_name }}
          github-files: build/libs/intruderalerts-*.jar
          github-generate-changelog: true
          name: IntruderAlerts ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release
          loaders: fabric
          game-versions: '26.1.2'
          java: '25'

      # Modrinth publishing: only runs once the MODRINTH_PROJECT_ID repo variable is set
      # (and MODRINTH_TOKEN repo secret is configured). Until then this step is skipped.
      - name: Publish to Modrinth
        if: vars.MODRINTH_PROJECT_ID != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false
          files: build/libs/intruderalerts-*.jar
          name: IntruderAlerts ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release
          loaders: fabric
          game-versions: '26.1.2'
          java: '25'
          dependencies: |
            fabric-api(required)
